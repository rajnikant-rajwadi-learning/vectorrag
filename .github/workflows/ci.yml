name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Sync environment (locked)
        run: uv sync --frozen

      - name: Lint
        run: |
          uv run ruff check src api tests
          uv run ruff format --check src api tests

      - name: Type check
        run: uv run mypy src

      - name: Tests
        run: uv run pytest --cov=vectorrag --cov-report=term-missing
